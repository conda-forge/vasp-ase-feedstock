schema_version: 1

context:
  name: vasp-ase
  version: "2.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/vasp_ase-${{ version }}.tar.gz
  sha256: 48088c306268d5b1cd5461418157221cbd8970f62d249b13095d3ac7417463ef

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - vasp-claude = vasp.cli:main
      - vasp-status = vasp.cli:status_command
      - vaspsum = vasp.cli:vaspsum
      - vasp-debug = vasp.cli:vasp_debug

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.22
    - ase >=3.22
    - scipy >=1.8

tests:
  - python:
      imports:
        - vasp
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - vasp-claude --help
      - vasp-status --help
      - vaspsum --help
      - vasp-debug --help

about:
  summary: Modern ASE calculator interface for VASP with workflow integration
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/jkitchin/vasp

extra:
  recipe-maintainers:
    - jan-janssen
